<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Pós-Operatório · Dr. Carlos Bruno</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f2ee;--surface:#fff;--surface2:#f0ede8;--text:#1a1714;--text2:#6b6560;--text3:#a09990;--border:rgba(26,23,20,0.10);--border2:rgba(26,23,20,0.18);--accent:#8b4513;--accent-bg:#f7ede4;--accent-text:#7a3910;--warn:#b8860b;--warn-bg:#fdf6e3;--warn-text:#9a6f00;--danger:#c0392b;--danger-bg:#fdf0ee;--danger-text:#a93226;--success:#2e7d52;--success-bg:#eaf5ee;--success-text:#276644;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent);letter-spacing:-0.02em}
.logo span{color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:300;display:block}
.sync-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;transition:opacity 0.15s}
.sync-btn:hover{opacity:0.85}.sync-btn.loading{opacity:0.6;pointer-events:none}
nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.nav-tab{padding:12px 18px;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:color 0.15s}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
main{padding:20px;max-width:720px;margin:0 auto}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat-num{font-family:'DM Serif Display',serif;font-size:28px}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.alert{border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:12px;border-left:3px solid}
.alert-warn{background:var(--warn-bg);border-color:var(--warn)}
.alert-danger{background:var(--danger-bg);border-color:var(--danger)}
.alert-title{font-size:13px;font-weight:500;margin-bottom:8px}
.alert-warn .alert-title{color:var(--warn-text)}.alert-danger .alert-title{color:var(--danger-text)}
.p-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.p-row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--accent-bg);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.p-name{font-size:14px;font-weight:500}.p-sub{font-size:12px;color:var(--text2);margin-top:1px}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-today{background:var(--warn-bg);color:var(--warn-text)}.badge-late{background:var(--danger-bg);color:var(--danger-text)}
.badge-ok{background:var(--success-bg);color:var(--success-text)}.badge-future{background:var(--surface2);color:var(--text2)}
.badge-suspended{background:var(--surface2);color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;font-size:12px;cursor:pointer;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text);font-family:'DM Sans',sans-serif;transition:background 0.12s;text-decoration:none}
.btn:hover{background:var(--surface2)}.btn-accent{color:var(--accent-text);border-color:var(--accent)}
.btn-danger{color:var(--danger-text);border-color:var(--danger)}.btn-success{color:var(--success-text);border-color:var(--success)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-today{background:var(--warn)}.dot-late{background:var(--danger)}.dot-ok{background:var(--success)}.dot-future{background:var(--text3)}.dot-done{background:var(--border2)}
.section-lbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin:16px 0 8px}
input,select{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--surface);color:var(--text);outline:none;transition:border-color 0.12s}
input:focus,select:focus{border-color:var(--accent)}
label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,0.4);display:flex;align-items:flex-start;justify-content:center;padding:60px 16px 16px;z-index:100;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px 22px;width:100%;max-width:480px}
.modal-header{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px}
.sched-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.sched-item:last-child{border-bottom:none}.sched-date{min-width:60px;color:var(--text2)}
.tag-trello{font-size:10px;padding:1px 6px;border-radius:10px;background:#e8f0fe;color:#1a56db;margin-left:4px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:white;font-size:13px;padding:10px 20px;border-radius:var(--radius-sm);z-index:200;white-space:nowrap;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s}
.cloud-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:10px}
@media(max-width:480px){main{padding:12px}.form-grid{grid-template-columns:1fr}header{padding:12px 16px}}
</style>
</head>
<body>
<header>
  <div class="logo">Dr. Carlos Bruno <span>Acompanhamento Pós-Operatório</span></div>
  <button class="sync-btn" id="sync-btn" onclick="syncTrello()"><span>&#8635;</span> Sincronizar</button>
</header>
<nav>
  <button class="nav-tab active" onclick="showTab('hoje')">Hoje</button>
  <button class="nav-tab" onclick="showTab('pacientes')">Pacientes</button>
  <button class="nav-tab" onclick="showTab('novo')">+ Paciente</button>
  <button class="nav-tab" onclick="showTab('config')">Configurações</button>
</nav>
<main>
  <div id="modal-area"></div>
  <div id="tab-hoje"></div>
  <div id="tab-pacientes" style="display:none"></div>
  <div id="tab-novo" style="display:none"></div>
  <div id="tab-config" style="display:none"></div>
</main>
<script>
const TODAY=new Date();TODAY.setHours(0,0,0,0);

function fmt(d){return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}
function fmtS(d){return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}
function addDays(d,n){const r=new Date(d+'T12:00:00');r.setDate(r.getDate()+n);return r.toISOString().split('T')[0]}

function genSchedule(dateStr,fase){
  const start=new Date(dateStr+'T12:00:00');
  const sched=[];
  const days=fase==='diario14'?14:7;
  for(let i=1;i<=days;i++) sched.push({date:addDays(dateStr,i),label:`Dia ${i} pós-op`});
  const base=new Date(dateStr+'T12:00:00');base.setDate(base.getDate()+days);
  const baseStr=base.toISOString().split('T')[0];
  sched.push({date:addDays(baseStr,15),label:'15 dias'});
  sched.push({date:addDays(baseStr,30),label:'30 dias'});
  for(let m=2;m<=6;m+=2){const d=new Date(dateStr+'T12:00:00');d.setMonth(d.getMonth()+m);sched.push({date:d.toISOString().split('T')[0],label:`${m} meses`})}
  for(let y=1;y<=5;y++){const d=new Date(dateStr+'T12:00:00');d.setFullYear(d.getFullYear()+y);sched.push({date:d.toISOString().split('T')[0],label:`${y} ano${y>1?'s':''}`})}
  return sched;
}

function parseCard(title){
  const m=title.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(.+?)(?:\s+N[°º]?\s*[\d\/]+.*)?$/i);
  if(!m) return null;
  return{dateStr:`${m[3]}-${m[2]}-${m[1]}`,name:m[4].trim()};
}

function getStatus(dateStr){
  const d=new Date(dateStr+'T12:00:00');d.setHours(0,0,0,0);
  const diff=(d-TODAY)/86400000;
  if(diff<-0.5) return 'late';
  if(diff<1) return 'today';
  return 'future';
}

function nextContact(p){
  for(let i=0;i<p.schedule.length;i++) if(!p.done[i]) return{idx:i,contact:p.schedule[i]};
  return null;
}

let patients=[];
let progress={};
let trelloBoards=[];
let cloudSynced=false;

async function loadProgress(){
  try{
    const r=await fetch('/api/progress');
    if(r.ok){progress=await r.json();cloudSynced=true;}
  }catch(e){
    try{const raw=localStorage.getItem('drcarlos_progress');if(raw)progress=JSON.parse(raw);}catch(e2){}
  }
}

async function saveProgress(){
  patients.forEach(p=>{progress[p.id]=p.done;});
  try{
    const r=await fetch('/api/progress',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(progress)});
    if(r.ok) cloudSynced=true;
  }catch(e){
    try{localStorage.setItem('drcarlos_progress',JSON.stringify(progress));}catch(e2){}
    cloudSynced=false;
  }
}

function loadPatients(){
  try{patients=JSON.parse(localStorage.getItem('drcarlos_pats_v4')||'[]');}catch(e){patients=[];}
  patients.forEach(p=>{
    if(!p.schedule) p.schedule=genSchedule(p.data,p.fase||'diario7');
    p.done=progress[p.id]||{};
  });
}
function savePatients(){try{localStorage.setItem('drcarlos_pats_v4',JSON.stringify(patients));}catch(e){}}

async function trelloGet(path,params={}){
  const qs=new URLSearchParams(params).toString();
  const url=`/api/trello/${path}${qs?'?'+qs:''}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Erro Trello '+r.status);
  return r.json();
}

async function syncTrello(){
  const btn=document.getElementById('sync-btn');
  btn.classList.add('loading');
  btn.innerHTML='<span class="spinner"></span> Sincronizando...';
  try{
    const boards=await trelloGet('members/me/boards',{filter:'open',fields:'id,name'});
    trelloBoards=boards;
    const targets=boards.filter(b=>b.name.toLowerCase().includes('cirurgia')||b.name.toLowerCase().includes('mohs'));
    let added=0;
    for(const board of targets){
      const lists=await trelloGet(`boards/${board.id}/lists`,{fields:'id,name'});
      for(const list of lists){
        const cards=await trelloGet(`lists/${list.id}/cards`,{fields:'id,name'});
        for(const card of cards){
          const parsed=parseCard(card.name);
          if(!parsed) continue;
          if(!patients.find(p=>p.trelloId===card.id)){
            const id='t_'+card.id;
            patients.push({id,trelloId:card.id,nome:parsed.name,data:parsed.dateStr,proc:'Cirurgia de Mohs',fase:'diario7',board:board.name,wpp:'',obs:'',done:progress[id]||{},schedule:genSchedule(parsed.dateStr,'diario7'),suspended:false});
            added++;
          }
        }
      }
    }
    savePatients();
    renderAll();
    showToast(added>0?`${added} paciente(s) importado(s) do Trello`:'Trello sincronizado');
  }catch(e){showToast('Erro: '+e.message);}
  finally{btn.classList.remove('loading');btn.innerHTML='&#8635; Sincronizar';}
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}

function initials(nome){return nome.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();}

function renderHoje(){
  const el=document.getElementById('tab-hoje');
  const todayList=[],lateList=[],next7=[];
  patients.forEach(p=>{
    if(p.suspended) return;
    const nc=nextContact(p);if(!nc) return;
    const st=getStatus(nc.contact.date);
    if(st==='today') todayList.push({p,nc});
    else if(st==='late') lateList.push({p,nc});
    else{const diff=Math.round((new Date(nc.contact.date+'T12:00:00')-TODAY)/86400000);if(diff<=7)next7.push({p,nc,diff});}
  });
  next7.sort((a,b)=>a.diff-b.diff);
  const ativos=patients.filter(p=>!p.suspended&&nextContact(p)).length;
  const syncBadge=cloudSynced
    ?`<span class="cloud-badge" style="background:var(--success-bg);color:var(--success-text)">&#9729; Nuvem ativa</span>`
    :`<span class="cloud-badge" style="background:var(--warn-bg);color:var(--warn-text)">&#9888; Modo local</span>`;

  let html=`<div style="display:flex;justify-content:flex-end;margin-bottom:10px">${syncBadge}</div>`;
  html+=`<div class="stat-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${todayList.length}</div><div class="stat-lbl">Hoje</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${lateList.length}</div><div class="stat-lbl">Atrasados</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--success)">${ativos}</div><div class="stat-lbl">Em acomp.</div></div>
  </div>`;

  if(lateList.length){
    html+=`<div class="alert alert-danger"><div class="alert-title">Atrasados (${lateList.length})</div>`;
    lateList.forEach(({p,nc})=>{
      const days=Math.round((TODAY-new Date(nc.contact.date+'T12:00:00'))/86400000);
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0"><div class="dot dot-late"></div><span style="flex:1;font-size:13px;font-weight:500">${p.nome}</span><span style="font-size:11px;color:var(--text2)">${nc.contact.label} · ${days}d atrás</span><button class="btn" onclick="openModal('${p.id}')">Ver</button></div>`;
    });
    html+='</div>';
  }
  if(todayList.length){
    html+=`<div class="alert alert-warn"><div class="alert-title">Contatos de hoje (${todayList.length})</div>`;
    todayList.forEach(({p,nc})=>{
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0"><div class="dot dot-today"></div><span style="flex:1;font-size:13px;font-weight:500">${p.nome}</span><span style="font-size:11px;color:var(--text2)">${nc.contact.label}</span><button class="btn" onclick="openModal('${p.id}')">Ver</button></div>`;
    });
    html+='</div>';
  }
  if(next7.length){
    html+=`<div class="section-lbl">Próximos 7 dias</div>`;
    next7.forEach(({p,nc,diff})=>{
      html+=`<div class="card" style="padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:6px"><div class="dot dot-ok"></div><div style="flex:1"><div style="font-size:14px;font-weight:500">${p.nome}</div><div style="font-size:12px;color:var(--text2)">${nc.contact.label} · ${fmt(nc.contact.date)}</div></div><span style="font-size:12px;color:var(--text2)">em ${diff}d</span><button class="btn" onclick="openModal('${p.id}')">Ver</button></div>`;
    });
  }
  if(!todayList.length&&!lateList.length&&!next7.length) html+=`<div class="empty">Nenhum contato pendente nos próximos 7 dias.</div>`;
  el.innerHTML=html;
}

function renderPatients(){
  const el=document.getElementById('tab-pacientes');
  const q=(el.querySelector('#sp')||{value:''}).value||'';
  const list=patients.filter(p=>p.nome.toLowerCase().includes(q.toLowerCase())||p.proc.toLowerCase().includes(q.toLowerCase()));
  let html=`<input type="text" id="sp" placeholder="Buscar paciente..." value="${q}" oninput="renderPatients()" style="margin-bottom:12px">`;
  if(!list.length){html+=`<div class="empty">Nenhum paciente.</div>`;el.innerHTML=html;return;}
  html+=`<div class="card">`;
  list.forEach(p=>{
    const nc=nextContact(p);
    let badge='';
    if(p.suspended) badge=`<span class="badge badge-suspended">Suspenso</span>`;
    else if(!nc) badge=`<span class="badge badge-ok">Concluído</span>`;
    else{const st=getStatus(nc.contact.date);if(st==='today')badge=`<span class="badge badge-today">Hoje</span>`;else if(st==='late')badge=`<span class="badge badge-late">Atrasado</span>`;else badge=`<span class="badge badge-future">${fmt(nc.contact.date)}</span>`;}
    const trTag=p.trelloId?`<span class="tag-trello">Trello</span>`:'';
    html+=`<div class="p-row"><div class="avatar">${initials(p.nome)}</div><div style="flex:1"><div class="p-name">${p.nome}${trTag}</div><div class="p-sub">${p.proc} · ${fmt(p.data)}</div>${p.obs?`<div style="font-size:11px;color:var(--warn-text);margin-top:2px">${p.obs}</div>`:''}</div>${badge}<button class="btn" style="margin-left:6px" onclick="openModal('${p.id}')">Ver</button></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
  const si=el.querySelector('#sp');
  if(si&&document.activeElement!==si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}
}

function renderNovo(){
  document.getElementById('tab-novo').innerHTML=`<div class="card">
    <div style="font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px">Novo paciente manual</div>
    <div class="form-grid">
      <div><label>Nome completo</label><input type="text" id="nn" placeholder="Nome do paciente"></div>
      <div><label>Data do procedimento</label><input type="date" id="nd"></div>
    </div>
    <div class="form-grid">
      <div><label>Procedimento</label><input type="text" id="np" placeholder="Ex: Cirurgia de Mohs"></div>
      <div><label>WhatsApp</label><input type="text" id="nw" placeholder="66 9 9999-0000"></div>
    </div>
    <div class="form-grid">
      <div><label>Fase inicial</label><select id="nf"><option value="diario7">Diário 7 dias</option><option value="diario14">Diário 14 dias</option></select></div>
      <div><label>Observações</label><input type="text" id="no" placeholder="Opcional"></div>
    </div>
    <button class="btn btn-accent" style="margin-top:4px" onclick="addManual()">Adicionar paciente</button>
  </div>`;
}

function addManual(){
  const nome=document.getElementById('nn').value.trim();
  const data=document.getElementById('nd').value;
  if(!nome||!data){showToast('Preencha nome e data.');return;}
  const id='m_'+Date.now();
  const fase=document.getElementById('nf').value;
  patients.push({id,nome,data,proc:document.getElementById('np').value.trim()||'Cirurgia de Mohs',wpp:document.getElementById('nw').value.trim(),fase,obs:document.getElementById('no').value.trim(),done:{},schedule:genSchedule(data,fase),suspended:false});
  savePatients();
  showToast('Paciente adicionado!');
  showTab('pacientes');
}

function renderConfig(){
  const boards=trelloBoards.filter(b=>b.name.toLowerCase().includes('cirurgia')||b.name.toLowerCase().includes('mohs'));
  document.getElementById('tab-config').innerHTML=`
  <div class="card">
    <div style="font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Sincronização</div>
    <div style="font-size:13px;margin-bottom:6px">${cloudSynced?'&#9729; Progresso salvo na nuvem (Railway)':'&#9888; Salvando localmente'}</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${boards.length?boards.map(b=>`Board: ${b.name}`).join('<br>'):'Nenhum board detectado ainda.'}</div>
    <button class="btn btn-accent" onclick="syncTrello()">Sincronizar Trello agora</button>
  </div>
  <div class="card" style="margin-top:10px">
    <div style="font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Dados</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:10px">${patients.length} paciente(s) · ${patients.filter(p=>p.trelloId).length} via Trello · ${patients.filter(p=>!p.trelloId).length} manuais</div>
    <button class="btn btn-danger" onclick="if(confirm('Limpar dados locais?')){localStorage.clear();patients=[];progress={};renderAll();showToast('Dados limpos.');}">Limpar dados locais</button>
  </div>`;
}

function openModal(pid){
  const p=patients.find(x=>String(x.id)===String(pid));if(!p) return;
  const nc=nextContact(p);
  const done=Object.values(p.done).filter(Boolean).length;
  const pct=Math.round((done/p.schedule.length)*100);
  let schedHtml='';
  p.schedule.forEach((c,i)=>{
    const isDone=!!p.done[i];
    const st=isDone?'done':getStatus(c.date);
    const dotCls={done:'dot-done',today:'dot-today',late:'dot-late',future:'dot-future'}[st];
    schedHtml+=`<div class="sched-item"><div class="dot ${dotCls}"></div><span class="sched-date">${fmtS(c.date)}</span><span style="flex:1">${c.label}</span><span onclick="toggleDone('${p.id}',${i})" style="cursor:pointer;font-size:16px;color:${isDone?'var(--text3)':'var(--success)'};padding:0 4px">${isDone?'✓':'○'}</span></div>`;
  });
  const wppNum=p.wpp?p.wpp.replace(/\D/g,''):'';
  const wppLink=wppNum?`https://wa.me/55${wppNum}`:'';
  document.getElementById('modal-area').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">${p.nome}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:10px">${p.proc} · ${fmt(p.data)}${p.trelloId?' · <span class="tag-trello">Trello</span>':''}</div>
      ${p.obs?`<div style="font-size:12px;background:var(--warn-bg);color:var(--warn-text);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:10px">Obs: ${p.obs}</div>`:''}
      ${nc?`<div style="font-size:12px;background:var(--success-bg);color:var(--success-text);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:10px">Próximo: ${nc.contact.label} — ${fmt(nc.contact.date)}</div>`:'<div style="font-size:12px;background:var(--success-bg);color:var(--success-text);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:10px">Acompanhamento concluído</div>'}
      <div style="margin-bottom:4px;font-size:11px;color:var(--text2)">${done} de ${p.schedule.length} contatos realizados</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:14px 0">
        <button class="btn btn-success" onclick="window.open('https://web.whatsapp.com','_blank')">Abrir WhatsApp</button>
        <button class="btn btn-accent" onclick="gerarMensagem('${p.id}')">Gerar mensagem ↗</button>
        <button class="btn" onclick="editObsModal('${p.id}')">+ Obs</button>
        <button class="btn" onclick="editPatient('${p.id}')">Editar</button>
        ${!p.suspended?`<button class="btn btn-danger" onclick="suspendP('${p.id}')">Suspender</button>`:'<span class="badge badge-suspended" style="padding:5px 10px">Suspenso</span>'}
        <button class="btn" onclick="closeModal()">Fechar</button>
      </div>
      <div id="msg-box-${p.id}" style="display:none;background:var(--surface2);border-radius:var(--radius-sm);padding:12px;font-size:13px;line-height:1.6;border:1px solid var(--border);margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em">Mensagem gerada</span>
          <button class="btn" onclick="copiarMsg('${p.id}')" id="copy-btn-${p.id}">Copiar</button>
        </div>
        <div id="msg-texto-${p.id}" style="color:var(--text)"></div>
      </div>
      <div id="obs-edit-${p.id}" style="display:none;margin-bottom:10px">
        <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Observação</label>
        <input type="text" id="obs-input-${p.id}" placeholder="Ex: Diabético, alérgico à dipirona..." style="margin-bottom:6px">
        <div style="display:flex;gap:6px">
          <button class="btn btn-accent" onclick="saveObs('${p.id}')">Salvar</button>
          <button class="btn" onclick="document.getElementById('obs-edit-${p.id}').style.display='none'">Cancelar</button>
        </div>
      </div>
      <div id="edit-form-${p.id}" style="display:none;border-top:1px solid var(--border);padding-top:12px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px">Editar paciente</div>
        <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Nome</label>
        <input type="text" id="edit-nome-${p.id}" value="${p.nome}" style="margin-bottom:8px">
        <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">Procedimento</label>
        <input type="text" id="edit-proc-${p.id}" value="${p.proc}" style="margin-bottom:8px">
        <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">WhatsApp</label>
        <input type="text" id="edit-wpp-${p.id}" value="${p.wpp||''}" style="margin-bottom:8px">
        <div style="display:flex;gap:6px">
          <button class="btn btn-accent" onclick="saveEdit('${p.id}')">Salvar</button>
          <button class="btn" onclick="document.getElementById('edit-form-${p.id}').style.display='none'">Cancelar</button>
        </div>
      </div>
      <div class="section-lbl">Cronograma</div>
      ${schedHtml}
    </div>
  </div>`;
}


function gerarMensagem(pid){
  const p=patients.find(x=>String(x.id)===String(pid));if(!p) return;
  const nc=nextContact(p);
  const momento=nc?nc.contact.label:'acompanhamento';
  const obs=p.obs?` Observação importante: ${p.obs}.`:'';
  const msg=`Olá! Passando para dar continuidade ao acompanhamento pós-operatório de ${p.nome}. Hoje é o contato de ${momento} após a ${p.proc} realizada em ${fmt(p.data)}.${obs} Como está se sentindo? Há alguma alteração na área operada? Estou à disposição. Dr. Carlos Bruno`;
  const box=document.getElementById('msg-box-'+pid);
  document.getElementById('msg-texto-'+pid).textContent=msg;
  box.style.display=box.style.display==='none'?'block':'none';
}

function copiarMsg(pid){
  const txt=document.getElementById('msg-texto-'+pid).textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('copy-btn-'+pid);
    btn.textContent='Copiado!';
    setTimeout(()=>btn.textContent='Copiar',2000);
  });
}

function editObsModal(pid){
  const p=patients.find(x=>String(x.id)===String(pid));if(!p) return;
  const box=document.getElementById('obs-edit-'+pid);
  document.getElementById('obs-input-'+pid).value=p.obs||'';
  box.style.display=box.style.display==='none'?'block':'none';
}

function saveObs(pid){
  const p=patients.find(x=>String(x.id)===String(pid));if(!p) return;
  p.obs=document.getElementById('obs-input-'+pid).value.trim();
  savePatients();
  showToast('Observação salva!');
  openModal(pid);
}

function editPatient(pid){
  const box=document.getElementById('edit-form-'+pid);
  box.style.display=box.style.display==='none'?'block':'none';
}

function saveEdit(pid){
  const p=patients.find(x=>String(x.id)===String(pid));if(!p) return;
  p.nome=document.getElementById('edit-nome-'+pid).value.trim()||p.nome;
  p.proc=document.getElementById('edit-proc-'+pid).value.trim()||p.proc;
  p.wpp=document.getElementById('edit-wpp-'+pid).value.trim();
  savePatients();
  showToast('Paciente atualizado!');
  openModal(pid);
}

function closeModal(){document.getElementById('modal-area').innerHTML='';renderAll();}

async function toggleDone(pid,idx){
  const p=patients.find(x=>String(x.id)===String(pid));if(!p) return;
  p.done[idx]=!p.done[idx];
  savePatients();
  await saveProgress();
  openModal(pid);
}

function suspendP(pid){
  if(!confirm('Suspender acompanhamento?')) return;
  const p=patients.find(x=>String(x.id)===String(pid));
  if(p){p.suspended=true;savePatients();}
  closeModal();
}

function showTab(t){
  ['hoje','pacientes','novo','config'].forEach(x=>{
    document.getElementById('tab-'+x).style.display=x===t?'block':'none';
    document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',['hoje','pacientes','novo','config'][i]===t));
  });
  if(t==='pacientes') renderPatients();
  else if(t==='novo') renderNovo();
  else if(t==='config') renderConfig();
  else renderHoje();
}

function renderAll(){
  renderHoje();
  const active=['hoje','pacientes','novo','config'].find(t=>document.getElementById('tab-'+t).style.display!=='none')||'hoje';
  if(active==='pacientes') renderPatients();
  else if(active==='config') renderConfig();
}

async function init(){
  await loadProgress();
  loadPatients();
  await syncTrello();
}

init();
</script>
</body>
</html>
